AWSTemplateFormatVersion: "2010-09-09"
Description: Child stack 2 - ECS Cluster, Task Definition and Service.

Parameters:
  AwsAccountId:
    Type: String
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID.
    Description: AWS account ID used to build the container image URL (passed from parent).
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC id, supplied by the parent via Fn::ImportValue from the network stack.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  ImageRepoName:
    Type: String
    Default: myapp

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: app
          # Container image URL resolves the AWS account ID passed from the parent stack.
          Image: !Sub "${AwsAccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ImageRepoName}:latest"
          Essential: true
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp

  Service:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${AWS::StackName}-service"
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref SubnetId
          SecurityGroups:
            - !Ref SecurityGroupId